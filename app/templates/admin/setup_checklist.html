{% extends 'base.html' %}
{% block content %}
<h1 class="h4 mb-3">School Setup Checklist</h1>
<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table align-middle mb-0">
      <thead class="table-light"><tr><th>Checklist item</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td>{{ item.label }}</td>
          <td>{% if item.complete %}<span class="badge text-bg-success">Complete</span>{% else %}<span class="badge text-bg-warning">Needs action</span>{% endif %}</td>
          <td><a class="btn btn-outline-secondary btn-sm" href="{{ item.link }}">Open</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
