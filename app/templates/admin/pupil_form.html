{% extends 'base.html' %}

{% block title %}Add pupil{% endblock %}
{% set page_heading = 'Add pupil' %}

{% block content %}
<div class="mb-3">
  <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('admin.pupils') }}">← Back to pupils</a>
</div>

<div class="card shadow-sm">
  <div class="card-header bg-white"><strong>New pupil</strong></div>
  <div class="card-body">
    <form method="post" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">First name</label>
        <input name="first_name" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Last name</label>
        <input name="last_name" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Class</label>
        <select name="class_id" class="form-select" required>
          <option value="">Select class</option>
          {% for school_class in class_options %}
            <option value="{{ school_class.id }}">Year {{ school_class.year_group }} · {{ school_class.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-select">
          <option value="Unknown">Unknown</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Year joined school</label>
        <select name="join_year_group" class="form-select">
          <option value="">Unknown</option>
          <option value="0">Reception</option>
          {% for year in range(1, 7) %}<option value="{{ year }}">Year {{ year }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Join date</label>
        <input type="date" name="join_date" class="form-control">
      </div>
      <div class="col-12">
        <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="pupil_premium" id="pp"><label class="form-check-label" for="pp">Pupil Premium</label></div>
        <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="laps" id="laps"><label class="form-check-label" for="laps">LAPS</label></div>
        <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="service_child" id="service"><label class="form-check-label" for="service">Service child</label></div>
        <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="send" id="send"><label class="form-check-label" for="send">SEND</label></div>
      </div>
      <div class="col-12">
        <label class="form-label">Notes</label>
        <textarea name="general_notes" class="form-control" rows="3" placeholder="Optional notes"></textarea>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Add pupil</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
