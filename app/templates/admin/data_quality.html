{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0">Data Quality</h1>
</div>
<div class="card shadow-sm mb-4"><div class="card-body"><form method="get" class="form-grid"><div class="col-md-3"><label class="form-label">Academic year</label><input class="form-control" name="academic_year" value="{{ academic_year }}"></div><div class="col-md-3"><label class="form-label">Term</label><select class="form-select" name="term">{% for value, label in term_options %}<option value="{{ value }}" {% if selected_term == value %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div><div class="form-actions"><button class="btn btn-primary">Apply</button></div></form></div></div>
<div class="row g-3">
  {% for item in issues %}
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm h-100">
      <div class="card-body d-flex flex-column gap-2">
        <div class="small text-muted">Issue</div>
        <div class="fw-semibold">{{ item.issue }}</div>
        <div class="small text-muted">Count</div>
        <div class="h4 mb-2">{{ item.count }}</div>
        <a class="btn btn-outline-secondary btn-sm mt-auto" href="{{ item.action_link }}">Open action page</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
