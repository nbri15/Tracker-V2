{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% set page_heading = 'Reset user password' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <strong>Reset password for {{ user.username }}</strong>
        <a href="{{ url_for('admin.users') }}" class="btn btn-sm btn-outline-secondary">Back to users</a>
      </div>
      <div class="card-body">
        <form method="post" class="form-grid">
          <div class="col-12">
            <label for="new_password" class="form-label">New password</label>
            <input id="new_password" name="new_password" type="password" class="form-control" minlength="8" required autocomplete="new-password">
          </div>
          <div class="col-12">
            <label for="confirm_password" class="form-label">Confirm password</label>
            <input id="confirm_password" name="confirm_password" type="password" class="form-control" minlength="8" required autocomplete="new-password">
          </div>
          <div class="col-12 form-check">
            <input class="form-check-input" type="checkbox" value="on" id="require_password_change" name="require_password_change" checked>
            <label class="form-check-label" for="require_password_change">
              Require password change at next login
            </label>
          </div>
          <div class="form-actions justify-content-end">
            <button type="submit" class="btn btn-primary">Reset Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
