{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h3 class="h5">Deactivate user?</h3>
    <p class="text-muted">This will block <strong>{{ user.username }}</strong> from logging in until reactivated.</p>
    <div class="alert alert-warning mb-3">
      Deactivation is reversible. Use delete only when permanent removal is safe.
    </div>
    <form method="post" action="{{ url_for('executive.deactivate_user', user_id=user.id) }}" class="d-flex gap-2">
      <button class="btn btn-warning">Deactivate user</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('executive.users') }}">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
