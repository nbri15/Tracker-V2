<header class="topbar border-bottom bg-white px-4 py-3 d-flex justify-content-between align-items-center">
  <div>
    <p class="topbar-kicker mb-1">Class Compass</p>
    <h2 class="h4 mb-0">{{ page_heading|default('Dashboard') }}</h2>
  </div>
  <div class="d-flex align-items-center gap-3">
    {% if is_demo_user() %}
      <span class="badge text-bg-warning text-uppercase">Demo Mode</span>
    {% endif %}
    <span class="badge text-bg-secondary text-uppercase">{{ current_user.role }}</span>
    <div class="text-end">
      <div class="fw-semibold">{{ current_user.username }}</div>
      {% if current_user.school %}<div class="small text-muted">{{ current_user.school.name }}</div>{% endif %}
      <a href="{{ url_for('auth.logout') }}" class="small text-decoration-none">Sign out</a>
    </div>
  </div>
</header>
